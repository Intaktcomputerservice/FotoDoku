<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FotoDoku</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>FotoDoku</h1>

      <section class="card section-main">
        <h2>Dateien auswählen</h2>
        <p class="section-description">Wähle eine oder mehrere Bilddateien für die Verarbeitung aus.</p>
        <button id="pickFilesBtn">Dateien auswählen</button>
      </section>

      <section class="card">
        <h2>Zielordner</h2>
        <div class="row target-row">
          <input id="targetFolderInput" type="text" readonly />
          <button id="pickTargetBtn">Für diesen Lauf ändern</button>
        </div>
      </section>

      <section class="card">
        <h2>Dateiliste</h2>
        <div id="fileList"></div>
      </section>

      <section class="card row">
        <button id="prepareBtn">Vorschläge erzeugen</button>
        <button id="processBtn" class="primary">Verarbeiten</button>
        <button id="cancelBtn" class="danger">Abbrechen</button>
      </section>

      <section class="card">
        <h2>Status</h2>
        <div id="progress">Bereit.</div>
        <div id="summary"></div>
      </section>

      <section class="card settings-card">
        <h2>Einstellungen</h2>
        <div class="row target-row">
          <input id="defaultFolderInput" type="text" readonly />
          <button id="pickDefaultBtn">Standardordner wählen</button>
          <button id="saveSettingsBtn">Speichern</button>
        </div>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
